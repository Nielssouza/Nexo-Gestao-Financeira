{% with current=request.path %}
<nav class="{{ nav_class|default:'txn-bottom-nav' }}">
    <a href="{% url 'dashboard:home' %}" class="txn-tab-link {% if current == '/' %}txn-tab-active{% endif %}" {% if current == '/' %}aria-current="page"{% endif %}>
        <span class="txn-tab-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 10.5L12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
        </span>
        <span>Principal</span>
    </a>

    <div class="fab-speed-dial" id="fab-speed-dial">
        <button
            type="button"
            class="{% if use_fab_dial %}dash-center-fab{% else %}txn-center-fab{% endif %}"
            id="fab-main-btn"
            {% if use_fab_dial %}
            onclick="toggleFabDial()"
            aria-expanded="false"
            {% else %}
            hx-get="{% url 'transactions:quick-add' %}"
            hx-target="#modal-content"
            hx-swap="innerHTML"
            hx-on::after-request="window.financeApp && window.financeApp.openModal()"
            {% endif %}
            aria-label="Ações rápidas"
        >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" class="{% if use_fab_dial %}dash-center-fab-icon{% else %}txn-center-fab-icon{% endif %}" aria-hidden="true">
                <path d="M12 5v14"></path>
                <path d="M5 12h14"></path>
            </svg>
        </button>
    </div>

    <div class="txn-more-menu-wrapper" id="txn-bottom-more-menu-wrapper">
        <button type="button" class="txn-tab-link" id="txn-bottom-more-btn" aria-expanded="false" aria-controls="txn-bottom-more-panel">
            <span class="txn-tab-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/></svg>
            </span>
            <span>Menu</span>
        </button>

        <div class="txn-bottom-more-panel hidden" id="txn-bottom-more-panel">
            <a href="{% url 'transactions:statement' %}" class="txn-more-link {% if current|slice:':14' == '/transactions/' %}txn-more-active{% endif %}">
                <span class="txn-more-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 7h14"/><path d="M5 12h14"/><path d="M5 17h14"/></svg></span>
                Financeiro
            </a>
            <a href="{% url 'invoices:list' %}" class="txn-more-link {% if current|slice:':9' == '/faturas/' %}txn-more-active{% endif %}">
                <span class="txn-more-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 8h8"/><path d="M8 12h8"/><path d="M8 16h5"/></svg></span>
                Faturamento
            </a>
            <a href="{% url 'accounts:list' %}" class="txn-more-link {% if current|slice:':10' == '/accounts/' %}txn-more-active{% endif %}">
                <span class="txn-more-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 9h18"/></svg></span>
                Contas
            </a>
            <a href="{% url 'categories:list' %}" class="txn-more-link {% if current|slice:':12' == '/categories/' %}txn-more-active{% endif %}">
                <span class="txn-more-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="5" cy="12" r="1.7"/><circle cx="12" cy="12" r="1.7"/><circle cx="19" cy="12" r="1.7"/></svg></span>
                Categorias
            </a>
            <a href="{% url 'investments:list' %}" class="txn-more-link {% if current|slice:':15' == '/investimentos/' %}txn-more-active{% endif %}">
                <span class="txn-more-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19V5"/><path d="M4 19h16"/><path d="M8 14l4-5 4 3 4-6"/></svg></span>
                Investimentos
            </a>
            <a href="{% url 'shopping:list' %}" class="txn-more-link {% if current|slice:':10' == '/shopping/' %}txn-more-active{% endif %}">
                <span class="txn-more-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 5h2l2.2 10h10.8l2-7H8.2"/><circle cx="10" cy="19" r="1.6"/><circle cx="17" cy="19" r="1.6"/></svg></span>
                Compras
            </a>
        </div>
    </div>
</nav>

<script>
    (function(){
        const moreBtn = document.getElementById('txn-bottom-more-btn');
        const morePanel = document.getElementById('txn-bottom-more-panel');
        const wrapper = document.getElementById('txn-bottom-more-menu-wrapper');
        
        if (!moreBtn || !morePanel || !wrapper) return;
        
        const close = () => {
            morePanel.classList.add('hidden');
            moreBtn.setAttribute('aria-expanded', 'false');
            moreBtn.classList.remove('txn-tab-active');
        };

        const open = () => {
            morePanel.classList.remove('hidden');
            moreBtn.setAttribute('aria-expanded', 'true');
            moreBtn.classList.add('txn-tab-active');
        };

        moreBtn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            if (morePanel.classList.contains('hidden')) {
                open();
            } else {
                close();
            }
        });

        document.addEventListener('pointerdown', (e) => {
            if (!wrapper.contains(e.target)) {
                close();
            }
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') close();
        });
    })();
</script>
{% endwith %}
