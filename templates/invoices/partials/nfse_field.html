<div class="flex items-start justify-between gap-3 py-2 border-b border-slate-800 last:border-0">
    <div class="min-w-0 flex-1">
        <p class="text-[0.68rem] font-semibold uppercase tracking-wider text-slate-500 mb-0.5">{{ label }}</p>
        {% if multiline %}
            <p class="text-sm text-slate-200 whitespace-pre-line leading-relaxed">{{ value }}</p>
        {% else %}
            <p class="text-sm text-slate-200 font-medium">{{ value }}</p>
        {% endif %}
    </div>
    <button type="button"
            onclick="copyField(this)"
            data-value="{{ value }}"
            class="shrink-0 mt-0.5 p-1.5 rounded-lg text-slate-400 hover:text-white hover:bg-white/10 transition-colors"
            title="Copiar">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
    </button>
</div>
