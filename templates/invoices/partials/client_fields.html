<div class="space-y-1">
    <label for="id_client_name" class="app-field-label">Nome do tomador</label>
    <input type="text" name="client_name" id="id_client_name" class="app-input" value="{{ client.name }}">
</div>
    <div class="space-y-1">
        <label for="id_client_document" class="app-field-label">CPF / CNPJ</label>
        <input type="text" name="client_document" id="id_client_document" class="app-input" value="{{ client.document }}">
    </div>
    <div class="space-y-1">
        <label for="id_client_email" class="app-field-label">E-mail do tomador</label>
        <input type="email" name="client_email" id="id_client_email" class="app-input" value="{{ client.email }}">
    </div>
    <div class="space-y-1">
        <label for="id_client_phone" class="app-field-label">Telefone</label>
        <input type="text" name="client_phone" id="id_client_phone" class="app-input" value="{{ client.phone }}">
    </div>
<div class="space-y-1">
    <label for="id_client_address" class="app-field-label">Endereço</label>
    <input type="text" name="client_address" id="id_client_address" class="app-input" value="{{ client.address }}">
</div>
<div class="space-y-1">
    <label for="id_client_city" class="app-field-label">Cidade / UF</label>
    <input type="text" name="client_city" id="id_client_city" class="app-input" value="{{ client.city }}">
</div>
<p class="text-xs text-slate-400">Cliente selecionado: <strong class="text-slate-200">{{ client.name }}</strong>
    <button type="button" class="text-slate-500 underline ml-2"
        onclick="document.getElementById('tomador-fields').innerHTML = window._emptyClientFields">limpar</button>
</p>
