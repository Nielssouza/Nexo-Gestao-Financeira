{% if clients %}
<ul class="rounded-xl border border-slate-700 bg-slate-900 overflow-hidden divide-y divide-slate-800 shadow-xl">
    {% for client in clients %}
    <li>
        <button type="button"
            class="w-full text-left px-4 py-3 hover:bg-slate-800 transition-colors"
            hx-get="{% url 'invoices:client-prefill' client.pk %}"
            hx-target="#tomador-fields"
            hx-swap="innerHTML"
            hx-on::after-request="window.clearClientSearchSelection && window.clearClientSearchSelection()">
            <p class="text-sm font-semibold text-slate-100">{{ client.name }}</p>
            {% if client.document %}<p class="text-xs text-slate-400">{{ client.document }}</p>{% endif %}
        </button>
    </li>
    {% endfor %}
</ul>
{% elif q %}
<div class="rounded-xl border border-slate-700 bg-slate-900 px-4 py-3 shadow-xl">
    <p class="text-xs text-slate-400">Nenhum cliente encontrado para "<strong class="text-slate-300">{{ q }}</strong>".</p>
</div>
{% endif %}
